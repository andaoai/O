<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    乙巳观 · AnDaoAi logo (深色底版)
    浅紫描边 + 紫色辉光，专为深色背景（如首页 #0a0a0a）设计
    结构与 andaoai-logo.svg 相同，仅颜色不同
  -->
  <defs>
    <filter id="purpleGlowDark" x="-50%" y="-50%" width="200%" height="200%">
      <!-- 内层：贴近的强紫光 -->
      <feGaussianBlur stdDeviation="1.5" result="blur1"/>
      <feFlood flood-color="#a855f7" flood-opacity="1" result="color1"/>
      <feComposite in="color1" in2="blur1" operator="in" result="glow1"/>

      <!-- 外层：大范围淡紫光晕 -->
      <feGaussianBlur stdDeviation="6" in="SourceGraphic" result="blur2"/>
      <feFlood flood-color="#c084fc" flood-opacity="0.7" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="glow2"/>

      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 主体：浅紫色（在深色底上清晰可见），套紫色辉光 -->
  <g filter="url(#purpleGlowDark)" fill="none" stroke="#e9d5ff" stroke-width="4">
    <!-- 外圆 -->
    <circle cx="100" cy="100" r="88"/>

    <!-- 内正方形 -->
    <rect x="45" y="45" width="110" height="110" stroke-width="3"/>

    <!-- 圆内上：AnDaoAi · 等宽字体 -->
    <text x="100" y="88"
          font-family="'JetBrains Mono', 'Fira Code', 'Consolas', 'SF Mono', 'Menlo', monospace"
          font-size="12"
          fill="#e9d5ff"
          stroke="none"
          text-anchor="middle"
          dominant-baseline="central"
          letter-spacing="1.2"
          font-weight="700">AnDaoAi</text>

    <!-- 圆内下：乙巳观 · 衬线，宽字距 -->
    <text x="100" y="115"
          font-family="'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif"
          font-size="16"
          fill="#e9d5ff"
          stroke="none"
          text-anchor="middle"
          dominant-baseline="central"
          letter-spacing="4"
          font-weight="700">乙巳观</text>
  </g>
</svg>
