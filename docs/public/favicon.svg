<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    乙巳观 · AnDaoAi favicon
    结构与 andaoai-logo.svg 一致：外圆 + 内方 + 圆内双行文字
    亮/暗主题自适应：玄青 #1a1033 / 淡紫金 #C8A2E8

    注意：CSS 里 stroke / fill 会覆盖 SVG 属性，所以拆两个类
    - .line 只给 stroke（圆、方用）
    - .type 只给 fill（文字用）
  -->
  <defs>
    <!-- 紫色辉光 filter -->
    <filter id="purpleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur1"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.9" result="color1"/>
      <feComposite in="color1" in2="blur1" operator="in" result="glow1"/>

      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="blur2"/>
      <feFlood flood-color="#c084fc" flood-opacity="0.55" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="glow2"/>

      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .line { stroke: #1a1033; fill: none; }
    .type { fill: #1a1033; stroke: none; }
    @media (prefers-color-scheme: dark) {
      .line { stroke: #C8A2E8; }
      .type { fill: #C8A2E8; }
    }
  </style>

  <g filter="url(#purpleGlow)">
    <!-- 外圆：只描边，不填充 -->
    <circle class="line" cx="100" cy="100" r="88" stroke-width="4"/>

    <!-- 内正方形：只描边，不填充 -->
    <rect class="line" x="45" y="45" width="110" height="110" stroke-width="3"/>

    <!-- 圆内上：AnDaoAi · 等宽字体 -->
    <text class="type" x="100" y="88"
          font-family="'JetBrains Mono', 'Fira Code', 'Consolas', 'SF Mono', 'Menlo', monospace"
          font-size="12"
          text-anchor="middle"
          dominant-baseline="central"
          letter-spacing="1.2"
          font-weight="700">AnDaoAi</text>

    <!-- 圆内下：乙巳观 · 衬线，宽字距 -->
    <text class="type" x="100" y="115"
          font-family="'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif"
          font-size="16"
          text-anchor="middle"
          dominant-baseline="central"
          letter-spacing="4"
          font-weight="700">乙巳观</text>
  </g>
</svg>
